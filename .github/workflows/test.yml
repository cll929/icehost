name: IceHost Auto Login

on:
  workflow_dispatch:        # 手动触发
  schedule:
    - cron: '0 0 * * *'    # 每天定时运行一次

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xdotool xvfb libgconf-2-4 libnss3-dev libatk-bridge2.0-0 libgtk-3-0
          pip install seleniumbase requests

      - name: Install Chrome
        run: |
          sudo apt-get install -y google-chrome-stable

      - name: Run IceHost Challenge Bypass
        env:
          # 在 GitHub Secrets 中配置这些变量
          ICEHOST_EMAIL: ${{ secrets.ICEHOST_EMAIL }}
          ICEHOST_PASSWORD: ${{ secrets.ICEHOST_PASSWORD }}
        # 使用 xvfb-run 开启虚拟显示器环境，并指定分辨率
        run: |
          xvfb-run --server-args="-screen 0 1280x1024x24" python3 icehost_script.py

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
